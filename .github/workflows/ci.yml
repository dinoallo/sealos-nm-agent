name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  go-ci:
    name: Go format, lint, generate, build, and test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up clang
        run: |
          sudo apt-get update
          sudo apt-get install -y clang llvm

      - name: Verify Go formatting
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "The following files are not formatted:"
            echo "$unformatted"
            exit 1
          fi

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest

      - name: Verify generated code is up to date
        run: |
          make generate
          git diff --exit-code

      - name: Build
        run: go build ./...

      - name: Test
        run: go test ./...
