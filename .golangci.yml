version: "2"

run:
  timeout: 5m

issues:
  max-issues-per-linter: 0
  max-same-issues: 0

linters:
  disable-all: true
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - typecheck
    - unused

linters-settings:
  errcheck:
    check-type-assertions: true
    check-blank: true

exclusions:
  generated: strict
  rules:
    - path: ".*_generate\\.go"
      linters:
        - staticcheck
    - path: ".*\\.pb\\.go"
      linters:
        - staticcheck
